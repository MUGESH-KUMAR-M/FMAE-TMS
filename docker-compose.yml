version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: fmae_tms_db
    environment:
      POSTGRES_DB: fmae_tms_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fmae-network

  # Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fmae_tms_backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: fmae_tms_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      PORT: 5000
      NODE_ENV: production
      JWT_SECRET: your_jwt_secret_key_here
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    networks:
      - fmae-network

  # Frontend React App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fmae_tms_frontend
    environment:
      VITE_API_URL: http://backend:5000/api
      VITE_SOCKET_URL: http://backend:5000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - fmae-network

volumes:
  postgres_data:

networks:
  fmae-network:
    driver: bridge
